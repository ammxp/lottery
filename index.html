<script>
// ============================================================
// 0. 公共请求头
// ============================================================
const COMMON_HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36',
    'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8',
    'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
    'Accept-Encoding': 'gzip, deflate, br',
    'Connection': 'keep-alive',
    'Cache-Control': 'max-age=0',
};

// ============================================================
// 1. 数据解析函数（支持多种格式）
// ============================================================

// 解析 500 彩票网 HTML（双色球/大乐透通用）
function parse500Html(html, redCount, blueCount) {
    const records = [];
    let tbodyMatch = html.match(/<tbody\s+id="tdata">([\s\S]*?)<\/tbody>/i);
    let content = tbodyMatch ? tbodyMatch[1] : html;
    const rows = content.match(/<tr[^>]*>([\s\S]*?)<\/tr>/gi);
    if (rows) {
        for (let row of rows) {
            if (row.includes('th') || row.includes('class="tdbck"')) continue;
            const cells = row.match(/<td[^>]*>([\s\S]*?)<\/td>/gi);
            if (!cells || cells.length < redCount + blueCount + 1) continue;
            const texts = cells.map(cell => cell.replace(/<[^>]+>/g, '').trim());
            const issue = texts[0]?.padStart(5, '0') || '';
            if (!/^\d{5}$/.test(issue)) continue;
            const reds = [];
            const blues = [];
            let idx = 1;
            for (let i = 0; i < redCount; i++) {
                if (idx < texts.length) { const v = parseInt(texts[idx]); if (!isNaN(v) && v >= 1 && v <= 35) reds.push(v); idx++; }
            }
            for (let i = 0; i < blueCount; i++) {
                if (idx < texts.length) { const v = parseInt(texts[idx]); if (!isNaN(v) && v >= 1 && v <= 16) blues.push(v); idx++; }
            }
            if (reds.length === redCount && blues.length === blueCount) {
                reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
                records.push({ issue, red: reds, blue: blues });
            }
        }
    }
    return records;
}

// 解析中国福利彩票官方 JSON（双色球）
function parseCwlJson(jsonText) {
    try {
        const data = JSON.parse(jsonText);
        const list = data.result?.list || [];
        return list.map(item => {
            const issue = item.code?.padStart(5, '0') || '';
            const reds = item.red?.split(',').map(Number) || [];
            const blues = item.blue?.split(',').map(Number) || [];
            if (reds.length === 6 && blues.length === 1) {
                reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
                return { issue, red: reds, blue: blues };
            }
            return null;
        }).filter(Boolean);
    } catch(e) { return []; }
}

// 解析中国体育彩票官方 JSON（大乐透）
function parseSportteryJson(jsonText) {
    try {
        const data = JSON.parse(jsonText);
        const list = data.value?.list || [];
        return list.map(item => {
            const issue = item.lotteryDrawNum?.padStart(5, '0') || '';
            const reds = item.frontWinningNumbers?.split(' ').map(Number) || [];
            const blues = item.backWinningNumbers?.split(' ').map(Number) || [];
            if (reds.length === 5 && blues.length === 2) {
                reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
                return { issue, red: reds, blue: blues };
            }
            return null;
        }).filter(Boolean);
    } catch(e) { return []; }
}

// 通用纯文本解析（GitHub 数据）
function parsePlainText(text, redCount, blueCount, redMax, blueMax) {
    const records = [];
    const lines = text.split('\n');
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        const parts = line.split(/\s+/);
        if (parts.length < redCount + blueCount + 1) continue;
        const issue = parts[0].padStart(5, '0');
        if (!/^\d{5}$/.test(issue)) continue;
        const reds = parts.slice(1, 1 + redCount).map(Number);
        const blues = parts.slice(1 + redCount, 1 + redCount + blueCount).map(Number);
        if (reds.some(isNaN) || blues.some(isNaN)) continue;
        if (reds.some(n => n < 1 || n > redMax) || blues.some(n => n < 1 || n > blueMax)) continue;
        reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
        records.push({ issue, red: reds, blue: blues });
    }
    return records;
}

// ============================================================
// 2. 配置：使用公共代理构建数据源
// ============================================================
const PROXY_LIST = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest=',
];

// 真实数据源 URL（不加代理）
const ORIGINAL_URLS = {
    ssq: {
        html500: 'https://datachart.500.com/ssq/history/newinc/history.php?start=03001&end=99999',
        cwl: 'https://www.cwl.gov.cn/cwl_admin/front/cwlkj/search/kjxx/findDrawNotice?name=ssq&pageNum=1&pageSize=50&system=WEB',
        github: 'https://fastly.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_ssq.txt',
        github2: 'https://cdn.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_ssq.txt',
    },
    dlt: {
        html500: 'https://datachart.500.com/dlt/history/newinc/history.php?start=07001&end=99999',
        sporttery: 'https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry?gameNo=85&provinceId=0&pageSize=30&isVerify=1&pageNo=1',
        github: 'https://fastly.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_dlt.txt',
        github2: 'https://cdn.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_dlt.txt',
    }
};

function buildDataSources(lottery) {
    const urls = ORIGINAL_URLS[lottery];
    const sources = [];
    const isSsq = lottery === 'ssq';
    const redCount = isSsq ? 6 : 5;
    const blueCount = isSsq ? 1 : 2;
    const redMax = isSsq ? 33 : 35;
    const blueMax = isSsq ? 16 : 12;

    for (let proxy of PROXY_LIST) {
        // 500 HTML
        sources.push({
            url: proxy + encodeURIComponent(urls.html500),
            parseFn: (text) => parse500Html(text, redCount, blueCount)
        });
        // 官方 JSON
        if (isSsq) {
            sources.push({
                url: proxy + encodeURIComponent(urls.cwl),
                parseFn: parseCwlJson
            });
        } else {
            sources.push({
                url: proxy + encodeURIComponent(urls.sporttery),
                parseFn: parseSportteryJson
            });
        }
        // GitHub 纯文本（两个镜像）
        sources.push({
            url: proxy + encodeURIComponent(urls.github),
            parseFn: (text) => parsePlainText(text, redCount, blueCount, redMax, blueMax)
        });
        sources.push({
            url: proxy + encodeURIComponent(urls.github2),
            parseFn: (text) => parsePlainText(text, redCount, blueCount, redMax, blueMax)
        });
    }
    return sources;
}
