<script>
// ============================================================
// 0. 公共请求头（模拟真实浏览器）
// ============================================================
const COMMON_HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36',
    'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8',
    'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
    'Accept-Encoding': 'gzip, deflate, br',
    'Connection': 'keep-alive',
    'Cache-Control': 'max-age=0',
    'Referer': 'https://www.sporttery.cn/',
    'Origin': 'https://www.sporttery.cn'
};

// ============================================================
// 1. 彩种配置 ———— 纯文本数据源
// ============================================================
function parsePlainText(text, redCount, blueCount, redMax, blueMax) {
    const records = [];
    const lines = text.split('\n');
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        const parts = line.split(/\s+/);
        if (parts.length < redCount + blueCount + 1) continue;
        const issue = parts[0].padStart(5, '0');
        if (!/^\d{5}$/.test(issue)) continue;
        const reds = parts.slice(1, 1 + redCount).map(Number);
        const blues = parts.slice(1 + redCount, 1 + redCount + blueCount).map(Number);
        if (reds.some(isNaN) || blues.some(isNaN)) continue;
        if (reds.some(n => n < 1 || n > redMax) || blues.some(n => n < 1 || n > blueMax)) continue;
        reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
        records.push({ issue, red: reds, blue: blues });
    }
    return records;
}

const LOTTERY_CONFIG = {
    ssq: {
        name: '双色球', storageKey: 'ssq_history_data', redCount:6, blueCount:1, redMax:33, blueMax:16,
        redLabel:'红球', blueLabel:'蓝球', ballClass:{red:'red', blue:'blue'},
        defaultHistory: [
            { issue: "25001", red: [2,6,11,12,13,33], blue: [15] },
            { issue: "25002", red: [1,5,7,18,30,32], blue: [2] },
            { issue: "25003", red: [5,6,9,21,28,30], blue: [16] },
            { issue: "25004", red: [3,7,8,9,18,32], blue: [10] },
            { issue: "25005", red: [1,20,22,27,30,33], blue: [10] },
            { issue: "25006", red: [2,6,22,23,24,28], blue: [15] },
            { issue: "25007", red: [9,13,19,27,29,30], blue: [1] },
            { issue: "25008", red: [6,9,16,27,31,33], blue: [10] },
            { issue: "25009", red: [3,6,13,19,23,25], blue: [10] },
            { issue: "25010", red: [4,9,10,15,19,26], blue: [12] }
        ],
        preset: {
            hotCold:{hot:1,cold:1}, sum:{min:75,max:125}, morph:{oddEven:'3:3', size:'3:3'},
            chart:{repeat:1,consecutive:1,edge:1}, missLayer:'warm', zone:'2:2:2',
            span:{min:20,max:30}, golden:{min:105,max:121}
        },
        dataSources: [
            'https://cdn.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_ssq.txt',
            'https://ghproxy.com/https://raw.githubusercontent.com/BEWINDOWEB/lotterydata/main/lot_500_ssq.txt',
            'https://raw.githubusercontent.com/BEWINDOWEB/lotterydata/main/lot_500_ssq.txt'
        ],
        parseData: function(text) { return parsePlainText(text, this.redCount, this.blueCount, this.redMax, this.blueMax); }
    },
    dlt: {
        name: '大乐透', storageKey: 'dlt_history_data', redCount:5, blueCount:2, redMax:35, blueMax:12,
        redLabel:'前区', blueLabel:'后区', ballClass:{red:'front', blue:'back'},
        defaultHistory: [
            { issue: "25001", red: [5,12,18,25,33], blue: [4,9] },
            { issue: "25002", red: [3,10,15,22,30], blue: [1,11] },
            { issue: "25003", red: [8,14,19,26,34], blue: [5,10] },
            { issue: "25004", red: [1,9,17,24,31], blue: [6,8] },
            { issue: "25005", red: [6,13,20,28,35], blue: [3,12] },
            { issue: "25006", red: [4,11,21,27,32], blue: [2,7] },
            { issue: "25007", red: [7,16,23,29,34], blue: [4,9] },
            { issue: "25008", red: [2,10,18,25,33], blue: [1,11] },
            { issue: "25009", red: [9,15,22,30,35], blue: [5,10] },
            { issue: "25010", red: [3,12,19,26,31], blue: [6,8] }
        ],
        preset: {
            hotCold:{hot:1,cold:1}, sum:{min:50,max:100}, morph:{oddEven:'3:2', size:'3:2'},
            chart:{repeat:1,consecutive:1,edge:1}, missLayer:'warm', zone:null,
            span:{min:15,max:30}, golden:{min:65,max:85}
        },
        dataSources: [
            'https://cdn.jsdelivr.net/gh/BEWINDOWEB/lotterydata@main/lot_500_dlt.txt',
            'https://ghproxy.com/https://raw.githubusercontent.com/BEWINDOWEB/lotterydata/main/lot_500_dlt.txt',
            'https://raw.githubusercontent.com/BEWINDOWEB/lotterydata/main/lot_500_dlt.txt'
        ],
        parseData: function(text) { return parsePlainText(text, this.redCount, this.blueCount, this.redMax, this.blueMax); }
    }
};

// ============================================================
// 2. 当前彩种 & 数据
// ============================================================
let currentLottery = 'ssq';
let historyData = [];

function getConfig(){ return LOTTERY_CONFIG[currentLottery]; }
function loadFromStorage(){
    const config = getConfig();
    const stored = localStorage.getItem(config.storageKey);
    if(stored){ try{ const parsed=JSON.parse(stored); if(Array.isArray(parsed)&&parsed.length>0){ historyData=parsed; return true; } }catch(e){} }
    return false;
}
function saveToStorage(){ localStorage.setItem(getConfig().storageKey, JSON.stringify(historyData)); }
function initData(){ if(!loadFromStorage()){ historyData=[...getConfig().defaultHistory]; saveToStorage(); } updateDataStatus(); }

// ============================================================
// 3. 工具函数：获取统计期数（独立）
// ============================================================
function getPeriodValue(elId){
    const el = document.getElementById(elId);
    if(!el) return null;
    const val = parseInt(el.value);
    if(isNaN(val) || val <= 0) return null;
    return val;

// ============================================================
// 4. 统计 & 走势范围计算（独立期数）
// ============================================================
function calcTrendRanges(data, config, periodCount){
    if(periodCount === null || periodCount > data.length) periodCount = data.length;
    if(periodCount < 1) periodCount = data.length || 0;
    const used = data.slice(-periodCount);
    const rc=config.redCount, bc=config.blueCount;
    const redRanges = [], blueRanges = [];
    for(let pos=0; pos<rc; pos++){
        const freq = {};
        for(let item of used){
            const num = item.red[pos];
            freq[num] = (freq[num]||0)+1;
        }
        const candidates = Object.keys(freq).filter(k => freq[k] >= 2).map(Number);
        if(candidates.length === 0) redRanges.push([1, config.redMax]);
        else redRanges.push([Math.min(...candidates), Math.max(...candidates)]);
    }
    for(let pos=0; pos<bc; pos++){
        const freq = {};
        for(let item of used){
            const num = item.blue[pos];
            freq[num] = (freq[num]||0)+1;
        }
        const candidates = Object.keys(freq).filter(k => freq[k] >= 2).map(Number);
        if(candidates.length === 0) blueRanges.push([1, config.blueMax]);
        else blueRanges.push([Math.min(...candidates), Math.max(...candidates)]);
    }
    return { redRanges, blueRanges };
}

// 计算冷热分类（仅红球），基于指定期数，返回 { hotSet, coldSet }
function calcHotCold(data, config, periodCount){
    if(periodCount === null || periodCount > data.length) periodCount = data.length;
    if(periodCount < 1) periodCount = data.length || 0;
    const used = data.slice(-periodCount);
    const freq = new Array(config.redMax+1).fill(0);
    used.forEach(item => item.red.forEach(r => freq[r]++));
    const total = freq.reduce((a,b)=>a+b, 0);
    const avg = total / config.redMax;
    const hotSet = new Set(), coldSet = new Set();
    for(let i=1; i<=config.redMax; i++){
        if(freq[i] >= avg) hotSet.add(i);
        else coldSet.add(i);
    }
    return { hotSet, coldSet };
}

// 8. 工具函数
// ============================================================
function generateRandomTicket(config, trendRanges){
    const reds=[], blues=[];
    const rc=config.redCount, bc=config.blueCount;
    for(let pos=0; pos<rc; pos++){
        let range = (trendRanges && trendRanges.redRanges && trendRanges.redRanges[pos]) ? trendRanges.redRanges[pos] : [1, config.redMax];
        let min=range[0], max=range[1];
        if(min>max){ min=1; max=config.redMax; }
        let attempts=0, num;
        do {
            num = Math.floor(Math.random()*(max-min+1)) + min;
            attempts++;
            if(attempts>1000) { num=Math.floor(Math.random()*config.redMax)+1; break; }
        } while(reds.includes(num));
        reds.push(num);
    }
    reds.sort((a,b)=>a-b);
    for(let pos=0; pos<bc; pos++){
        let range = (trendRanges && trendRanges.blueRanges && trendRanges.blueRanges[pos]) ? trendRanges.blueRanges[pos] : [1, config.blueMax];
        let min=range[0], max=range[1];
        if(min>max){ min=1; max=config.blueMax; }
        let attempts=0, num;
        do {
            num = Math.floor(Math.random()*(max-min+1)) + min;
            attempts++;
            if(attempts>1000) { num=Math.floor(Math.random()*config.blueMax)+1; break; }
        } while(blues.includes(num));
        blues.push(num);
    }
    blues.sort((a,b)=>a-b);
    return { reds, blues };
}

function isInHistory(reds, blues){
    return historyData.some(item => {
        if(item.blue.length!==blues.length) return false;
        for(let i=0;i<blues.length;i++) if(item.blue[i]!==blues[i]) return false;
        if(item.red.length!==reds.length) return false;
        for(let i=0;i<reds.length;i++) if(item.red[i]!==reds[i]) return false;
        return true;
    });
}
function countConsecutiveGroups(reds){
    let groups=0, i=0;
    while(i<reds.length-1){
        if(reds[i+1]===reds[i]+1){ groups++; while(i<reds.length-1 && reds[i+1]===reds[i]+1) i++; } else i++;
    }
    return groups;
}

function calcStatsAll(data, config){
    const rc=config.redCount, bc=config.blueCount;
    stats.redFreq = new Array(config.redMax+1).fill(0);
    stats.blueFreq = new Array(config.blueMax+1).fill(0);
    stats.redMissing = new Array(config.redMax+1).fill(0);
    stats.blueMissing = new Array(config.blueMax+1).fill(0);
    stats.totalPeriods = data.length;
    data.forEach(item => {
        item.red.forEach(r => stats.redFreq[r]++);
        item.blue.forEach(b => stats.blueFreq[b]++);
    });
    if(data.length>0){
        const redSeen=new Set(), blueSeen=new Set();
        for(let i=data.length-1; i>=0; i--){
            const item=data[i];
            item.red.forEach(r=>{ if(!redSeen.has(r)){ stats.redMissing[r]=data.length-1-i; redSeen.add(r); } });
            item.blue.forEach(b=>{ if(!blueSeen.has(b)){ stats.blueMissing[b]=data.length-1-i; blueSeen.add(b); } });
            if(redSeen.size===config.redMax && blueSeen.size===config.blueMax) break;
        }
        for(let i=1;i<=config.redMax;i++) if(!redSeen.has(i)) stats.redMissing[i]=data.length;
        for(let i=1;i<=config.blueMax;i++) if(!blueSeen.has(i)) stats.blueMissing[i]=data.length;
    }
}
let stats = { redFreq:[], blueFreq:[], redMissing:[], blueMissing:[], totalPeriods:0 };

// ============================================================
// 9. 单注生成（集成所有策略）
// ============================================================
function generateSingleTicket(trendRanges, hotSet, coldSet, hotCount, coldCount){
    const config=getConfig();
    const enableHotCold = document.getElementById('enableHotCold')?.checked || false;
    const enableTrend = document.getElementById('enableTrend')?.checked || false;
    const enableSum = document.getElementById('enableSum')?.checked || false;
    const enableMorph = document.getElementById('enableMorph')?.checked || false;
    const enableChart = document.getElementById('enableChart')?.checked || false;
    const enableMissLayer = document.getElementById('enableMissLayer')?.checked || false;
    const enableZone = document.getElementById('enableZone')?.checked || false;
    const enableSpan = document.getElementById('enableSpan')?.checked || false;
    const enableGolden = document.getElementById('enableGolden')?.checked || false;

    let minSum = parseInt(document.getElementById('minSum')?.value) || 0;
    let maxSum = parseInt(document.getElementById('maxSum')?.value) || 999;
    const oddEvenStr = document.getElementById('oddEven')?.value || '3:3';
    const sizeStr = document.getElementById('sizeRatio')?.value || '3:3';
    const repeatTarget = parseInt(document.getElementById('chartRepeat')?.value) || 0;
    const consecutiveTarget = parseInt(document.getElementById('chartConsecutive')?.value) || 0;
    const edgeTarget = parseInt(document.getElementById('chartEdge')?.value) || 0;
    const missLayer = document.getElementById('chartMissLayer')?.value || 'all';
    const zoneStr = document.getElementById('zoneRatio')?.value || '2:2:2';
    const minSpan = parseInt(document.getElementById('minSpan')?.value) || 0;
    const maxSpan = parseInt(document.getElementById('maxSpan')?.value) || 999;

    if(enableGolden){ minSum=config.preset.golden.min; maxSum=config.preset.golden.max; }

    const [oddTarget, evenTarget] = oddEvenStr.split(':').map(Number);
    const [smallTarget, largeTarget] = sizeStr.split(':').map(Number);
    const smallMax = currentLottery==='ssq' ? 16 : 17;
    const lastItem = historyData.length>0 ? historyData[historyData.length-1] : null;

    let attempts=0, maxAttempts=100000, ticket=null;

    while(attempts<maxAttempts){
        attempts++;
        let reds, blues;
        if(enableTrend && trendRanges){
            const tmp = generateRandomTicket(config, trendRanges);
            reds = tmp.reds; blues = tmp.blues;
        } else {
            const tmp = generateRandomTicket(config, null);
            reds = tmp.reds; blues = tmp.blues;
        }

        if(enableHotCold && hotSet && coldSet){
            const redHotCount = reds.filter(r => hotSet.has(r)).length;
            const redColdCount = reds.filter(r => coldSet.has(r)).length;
            if(redHotCount < hotCount || redColdCount < coldCount) continue;
        }

        let valid = true;
        if(enableSum){ const sum=reds.reduce((a,b)=>a+b,0); if(sum<minSum || sum>maxSum) valid=false; }
        if(valid && enableMorph){
            const oddCount=reds.filter(v=>v%2===1).length;
            const evenCount=config.redCount-oddCount;
            const smallCount=reds.filter(v=>v<=smallMax).length;
            const largeCount=config.redCount-smallCount;
            if(oddCount!==oddTarget || evenCount!==evenTarget || smallCount!==smallTarget || largeCount!==largeTarget) valid=false;
        }
        if(valid && enableChart && lastItem){
            const repeatCount=reds.filter(n=>lastItem.red.includes(n)).length;
            if(repeatCount!==repeatTarget) valid=false;
            if(valid){ const consGroups=countConsecutiveGroups(reds); if(consGroups<consecutiveTarget) valid=false; }
            if(valid){ const edgeCount=reds.filter(n=>lastItem.red.some(m=>Math.abs(n-m)===1)).length; if(edgeCount<edgeTarget) valid=false; }
        }
        if(valid && enableMissLayer){
            for(let n of reds){
                const miss=stats.redMissing[n]||0;
                if(missLayer==='hot' && !(miss>=0 && miss<=5)){ valid=false; break; }
                if(missLayer==='warm' && !(miss>=6 && miss<=15)){ valid=false; break; }
                if(missLayer==='cold' && !(miss>=16)){ valid=false; break; }
            }
        }
        if(valid && enableZone && currentLottery==='ssq'){
            const [z1,z2,z3]=zoneStr.split(':').map(Number);
            const c1=reds.filter(n=>n<=11).length;
            const c2=reds.filter(n=>n>=12 && n<=22).length;
            const c3=reds.filter(n=>n>=23).length;
            if(c1!==z1 || c2!==z2 || c3!==z3) valid=false;
        }
        if(valid && enableSpan){
            const span=reds[reds.length-1]-reds[0];
            if(span<minSpan || span>maxSpan) valid=false;
        }
        if(valid && !isInHistory(reds, blues)){
            ticket={reds, blues};
            break;
        }
    }
    if(!ticket){
        let fallback = generateRandomTicket(config, null);
        let fbAttempts=0;
        while(isInHistory(fallback.reds, fallback.blues) && fbAttempts<1000){
            fallback = generateRandomTicket(config, null);
            fbAttempts++;
        }
        ticket=fallback;
    }
    return ticket;
}

// 10. 生成5注
// ============================================================
function generateFiveTickets(){
    const config=getConfig();
    const tickets=[];
    const usedSet=new Set();

    let trendRanges = null;
    if(document.getElementById('enableTrend')?.checked){
        const period = getPeriodValue('trendPeriods');
        trendRanges = calcTrendRanges(historyData, config, period);
    }

    let hotSet = null, coldSet = null;
    let hotCount=0, coldCount=0;
    if(document.getElementById('enableHotCold')?.checked){
        const period = getPeriodValue('coldHotPeriods');
        const result = calcHotCold(historyData, config, period);
        hotSet = result.hotSet;
        coldSet = result.coldSet;
        hotCount = parseInt(document.getElementById('hotCount')?.value) || 0;
        coldCount = parseInt(document.getElementById('coldCount')?.value) || 0;
    }

    calcStatsAll(historyData, config);

    let attempts=0;
    while(tickets.length<5 && attempts<200){
        attempts++;
        const t = generateSingleTicket(trendRanges, hotSet, coldSet, hotCount, coldCount);
        const key=t.reds.join(',')+'|'+t.blues.join(',');
        if(!usedSet.has(key)){ usedSet.add(key); tickets.push(t); }
    }
    while(tickets.length<5){
        const t=generateRandomTicket(config, null);
        const key=t.reds.join(',')+'|'+t.blues.join(',');
        if(!usedSet.has(key)){ usedSet.add(key); tickets.push(t); }
    }
    return tickets;
}

function addRecord(){
    const config=getConfig();
    const issueEl=document.getElementById('addIssue');
    const issue=issueEl?issueEl.value.trim():'';
    const reds=[], blues=[];
    for(let i=1;i<=config.redCount;i++){
        const el=document.getElementById('addR'+i);
        const val=el?parseInt(el.value):NaN;
        if(isNaN(val)||val<1||val>config.redMax){ showToast('⚠️ 请正确填写'+config.redLabel+' '+i); return; }
        reds.push(val);
    }
    for(let i=1;i<=config.blueCount;i++){
        const el=document.getElementById('addB'+i);
        const val=el?parseInt(el.value):NaN;
        if(isNaN(val)||val<1||val>config.blueMax){ showToast('⚠️ 请正确填写'+config.blueLabel+' '+i); return; }
        blues.push(val);
    }
    reds.sort((a,b)=>a-b); blues.sort((a,b)=>a-b);
    let targetIssue=issue;
    if(/^\d+$/.test(targetIssue)) targetIssue=targetIssue.padStart(5,'0');
    if(historyData.some(item=>item.issue===targetIssue)){ showToast('⚠️ 期号 '+targetIssue+' 已存在'); return; }
    historyData.push({ issue:targetIssue, red:reds, blue:blues });
    saveToStorage();
    updateStatsAndUI();
    if(issueEl) issueEl.value='';
    for(let i=1;i<=config.redCount;i++){ const el=document.getElementById('addR'+i); if(el) el.value=''; }
    for(let i=1;i<=config.blueCount;i++){ const el=document.getElementById('addB'+i); if(el) el.value=''; }
    showPlaceholder('✅ 已添加 '+targetIssue+' 期');
    showToast('✅ 已添加 '+targetIssue+' 期');
}

// 16. 联网更新（含更新时间记录）
// ============================================================
document.getElementById('updateBtn').addEventListener('click', function(){
    const config=getConfig();
    const btn=this;
    btn.disabled=true; btn.textContent='⏳';
    const tipEl=document.getElementById('quickTip');
    if(tipEl) tipEl.style.display='none';
    showToast('⏳ 正在获取'+config.name+'数据...');
    const sources=config.dataSources;
    let currentIndex=0, allRecords=[];

    function fetchWithTimeout(url, timeout=12000, options={}){
        return Promise.race([ fetch(url, options), new Promise((_,reject)=>setTimeout(()=>reject(new Error('超时')), timeout)) ]);
    }

    function trySource(index){
        if(index>=sources.length){
            if(allRecords.length>0){
                const existingIssues=new Set(historyData.map(i=>i.issue));
                const newRecords=allRecords.filter(r=>!existingIssues.has(r.issue));
                if(newRecords.length===0){
                    showToast('✅ '+config.name+'已是最新数据');
                    showPlaceholder('已是最新，无需更新');
                } else {
                    newRecords.sort((a,b)=>parseInt(a.issue)-parseInt(b.issue));
                    historyData=historyData.concat(newRecords);
                    saveToStorage();
                    localStorage.setItem('last_update_time', String(Date.now()));
                    updateStatsAndUI();
                    showPlaceholder('✅ 新增 '+newRecords.length+' 期（最新 '+newRecords[newRecords.length-1].issue+'）');
                    showToast('🎉 '+config.name+'新增 '+newRecords.length+' 期');
                }
            } else {
                showPlaceholder('❌ 所有数据源均失败，请手动新增'+config.name+'数据');
                showToast('❌ '+config.name+'更新失败，请手动输入');
                if(tipEl) tipEl.style.display='block';
                localStorage.setItem('last_update_time', String(Date.now()));
            }
            btn.disabled=false; btn.textContent='🌐';
            return;
        }
        const url=sources[index];
        showToast('⏳ 尝试数据源 '+(index+1)+'...');
        fetchWithTimeout(url, 12000, { headers: COMMON_HEADERS })
            .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
            .then(text=>{
                let records=[];
                try{ records=config.parseData(text); } catch(e){ console.warn('解析失败',e); }
                if(records && records.length>0){
                    allRecords=allRecords.concat(records);
                    showToast('✅ 数据源 '+(index+1)+' 获取 '+records.length+' 期');
                    if(allRecords.length>=100){
                        const existing=new Set(historyData.map(i=>i.issue));
                        const newData=allRecords.filter(r=>!existing.has(r.issue));
                        if(newData.length>0){
                            newData.sort((a,b)=>parseInt(a.issue)-parseInt(b.issue));
                            historyData=historyData.concat(newData);
                            saveToStorage();
                            localStorage.setItem('last_update_time', String(Date.now()));
                            updateStatsAndUI();
                            showPlaceholder('✅ 新增 '+newData.length+' 期（最新 '+newData[newData.length-1].issue+'）');
                            showToast('🎉 '+config.name+'新增 '+newData.length+' 期');
                        } else {
                            showToast('✅ '+config.name+'已是最新数据');
                            showPlaceholder('已是最新，无需更新');
                            localStorage.setItem('last_update_time', String(Date.now()));
                        }
                        btn.disabled=false; btn.textContent='🌐';
                        return;
                    }
                    trySource(index+1);
                } else {
                    showToast('⚠️ 数据源 '+(index+1)+' 解析为空');
                    trySource(index+1);
                }
            })
            .catch(err=>{
                console.warn('源失败',err);
                trySource(index+1);
            });
    }
    trySource(0);
});

document.getElementById('exportBtn').addEventListener('click', function(){

document.getElementById('fileInput').addEventListener('change', function(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    const isExcel=/\.(xlsx|xls)$/i.test(file.name);
    const isJSON=/\.json$/i.test(file.name);

    function loadData(records){
        if(records && records.length>0){
            historyData=records;
            saveToStorage();
            updateStatsAndUI();
            showPlaceholder('✅ 已加载 '+records.length+' 期');
            showToast('✅ 导入 '+records.length+' 期');
        } else { showToast('❌ 数据解析失败'); }
    }

    if(isExcel){
        reader.onload=function(ev){
            try{
                const workbook=XLSX.read(ev.target.result, {type:'array'});
                const firstSheet=workbook.Sheets[workbook.SheetNames[0]];
                const rows=XLSX.utils.sheet_to_json(firstSheet, {header:1});
                const records=[];
                const config=getConfig();
                let startRow=0;
                if(rows.length>0){
                    const first=rows[0];
                    if(first.length>=(config.redCount+config.blueCount+1) && typeof first[0]==='string' && isNaN(parseInt(first[0]))) startRow=1;
                }
                for(let i=startRow;i<rows.length;i++){
                    const row=rows[i];
                    if(!row || row.length<(config.redCount+config.blueCount+1)) continue;
                    const issueRaw=String(row[0]).trim();
                    let issue=issueRaw;
                    if(!isNaN(parseInt(issueRaw))) issue=issueRaw.padStart(5,'0');
                    const reds=[];
                    for(let j=1;j<=config.redCount;j++){ const val=parseInt(row[j]); if(!isNaN(val)&&val>=1&&val<=config.redMax) reds.push(val); }
                    if(reds.length!==config.redCount) continue;
                    reds.sort((a,b)=>a-b);
                    const blues=[];
                    for(let j=config.redCount+1;j<=config.redCount+config.blueCount;j++){ const val=parseInt(row[j]); if(!isNaN(val)&&val>=1&&val<=config.blueMax) blues.push(val); }
                    if(blues.length!==config.blueCount) continue;
                    blues.sort((a,b)=>a-b);
                    records.push({issue, red:reds, blue:blues});
                }
                loadData(records);
            } catch(e){ showToast('❌ Excel解析错误'); }
        };
        reader.readAsArrayBuffer(file);
    } else if(isJSON){
        reader.onload=function(ev){
            try{
                const data=JSON.parse(ev.target.result);
                if(!Array.isArray(data)) throw new Error('不是数组');
                const config=getConfig();
                const valid=data.every(item=>item.issue && Array.isArray(item.red) && item.red.length===config.redCount && Array.isArray(item.blue) && item.blue.length===config.blueCount);
                if(!valid) throw new Error('格式不符');
                loadData(data);
            } catch(e){ showToast('❌ JSON格式错误'); }
        };
        reader.readAsText(file);
    } else { showToast('⚠️ 请上传 .xlsx 或 .json'); }
    e.target.value='';
});

document.getElementById('searchBtn').addEventListener('click', function(){
    const input=document.getElementById('searchIssue');

    if(/^\d+$/.test(target)) target=target.padStart(5,'0');
    const found=historyData.find(item=>item.issue===target);
    const config=getConfig();
    const isDlt=currentLottery==='dlt';
    const ballClassRed=isDlt?'front':'red';
    const ballClassBlue=isDlt?'back':'blue';
    const container=document.getElementById('ticketsContainer');
    const msg=document.getElementById('statusMsg');
    if(found){
        container.innerHTML=`
            <div class="ticket-item" style="border-color:#2a4b6e;">
                <div class="ticket-header"><span class="label">📋 第 ${found.issue} 期</span><span>和值 ${found.red.reduce((a,b)=>a+b,0)}</span></div>
                <div class="balls-row">
                    ${found.red.map(n=>`<span class="ball-sm ${ballClassRed}">${n}</span>`).join('')}
                    ${found.blue.map(n=>`<span class="ball-sm ${ballClassBlue}">${n}</span>`).join('')}
                </div>
            </div>
        `;
        msg.textContent='📋 查询结果：第 '+found.issue+' 期';
        msg.style.background='#e3f2e9'; msg.style.color='#1e5a3a';
    } else { showToast('❌ 未找到期号 '+issue); }
});

// ============================================================
// 21. 自动更新检查
// ============================================================
function autoCheckUpdate(){
    const lastUpdate = localStorage.getItem('last_update_time');
    const now = Date.now();
    const needUpdate = !lastUpdate || (now - parseInt(lastUpdate)) > 86400000 || historyData.length === 0;
    if(needUpdate){
        setTimeout(() => {
            if(historyData.length === 0){
                showToast('🔄 正在自动获取数据...');
                document.getElementById('updateBtn').click();
            } else {
                showToast('🔄 自动检测到数据过期，正在更新...');
                document.getElementById('updateBtn').click();
            }
        }, 2000);
    }
}

}
